name: Build and Release APK

on:
  push:
    branches:
      - master
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-home-cache-cleanup: true
      
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: 'stable'
          cache: true
      
      - name: Get dependencies
        run: flutter pub get
      
      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/release-key.jks
      
      - name: Build Release APK (Obfuscated)
        env:
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          STORE_FILE: release-key.jks
        run: |
          flutter build apk --split-per-abi --obfuscate --split-debug-info=build/debug-info

      - name: List generated artifacts
        run: |
          ls -lah build/app/outputs/flutter-apk/
          ls -lah build/debug-info/
      
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-obfuscated-split-apks
          path: build/app/outputs/flutter-apk/*.apk
          if-no-files-found: error

      - name: Upload Split Debug Symbols
        uses: actions/upload-artifact@v4
        with:
          name: split-debug-info
          path: build/debug-info/**
          if-no-files-found: error
      
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/app/outputs/flutter-apk/*.apk
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Securely delete keystore
        if: always()
        run: |
          if [ -f android/app/release-key.jks ]; then
            shred -u -z android/app/release-key.jks || rm -f android/app/release-key.jks
          fi
